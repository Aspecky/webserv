server {
    listen 8080;
    host "127.0.0.1";
    max_body_size 1048576;

    error_page 404 /errors/404.html;
    error_page 500 /errors/500.html;

    location / {
        root /var/www/html;
        index index.html;
        methods GET POST;
        directory_listing off;
    }

    location /upload {
        root /var/www/uploads;
        methods POST DELETE;
        upload_store /var/www/uploads;
    }

    location /cgi-bin {
        root /var/www/cgi-bin;
        methods GET POST;
        cgi .php /usr/bin/php-cgi;
    }
}
